name: Add-on CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  addon-lint:
    name: Add-on Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint Home Assistant add-on
        uses: frenck/action-addon-linter@v2
        with:
          path: ./addons/thread-observability

  python-api-tests:
    name: Python API Tests
    runs-on: ubuntu-latest
    needs: addon-lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install app dependencies
        working-directory: ./addons/thread-observability/app
        run: python -m pip install --upgrade pip && python -m pip install -e .[test]

      - name: Run full pytest suite
        env:
          PYTHONPATH: addons/thread-observability/app/src
        run: pytest addons/thread-observability/app/tests -q

      - name: Run in-process API smoke
        env:
          PYTHONPATH: addons/thread-observability/app/src
        run: python scripts/api_surface_smoke.py

  addon-build-amd64:
    name: Add-on Build (amd64)
    runs-on: ubuntu-latest
    needs:
      - addon-lint
      - python-api-tests
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build add-on image
        uses: docker/build-push-action@v6
        with:
          context: ./addons/thread-observability
          file: ./addons/thread-observability/Dockerfile
          push: false
          tags: thread-observability:ci
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.20
