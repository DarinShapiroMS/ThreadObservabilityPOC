name: Thread Observability
version: 0.11.21
slug: thread-observability
description: Observe and troubleshoot Thread network health in Home Assistant.
url: https://github.com/DarinShapiroMS/ThreadObservabilityPOC/tree/main/addons/thread-observability
arch:
  - aarch64
  - amd64
startup: services
ingress: true
panel_icon: mdi:lan
init: false
homeassistant_api: true
hassio_api: true
hassio_role: admin
ports:
  8099/tcp: 8099
  8100/tcp: 8100
ports_description:
  8099/tcp: Thread Observability API and UI
  8100/tcp: Thread Observability MCP API
map:
  - config:rw
  - ssl
options:
  log_level: info
  timezone: UTC
  ha_admin_token: ""
  retention:
    full_resolution_days: 3
    sampled_archive_days: 14
  ai:
    enabled: false
    provider: local
    chat_backend: ha
    model: ""
    base_url: ""
    api_key: ""
  scheduler:
    ingestion_interval_seconds: 10
    topology_recompute_seconds: 30
    metadata_refresh_seconds: 900
  assessment:
    enabled: false
    probation_interval_minutes: 15
    probation_checks: 3
    relaxing_initial_hours: 1
    relaxing_max_hours: 24
    heightened_initial_minutes: 30
    heightened_max_hours: 6
    engaged_interval_minutes: 5
    engaged_decay_minutes: 60
    daily_budget_calls: 12
    context_recent_findings_default: 10
schema:
  log_level: list(trace|debug|info|warning|error|fatal)
  timezone: str
  ha_admin_token: password?
  retention:
    full_resolution_days: int(1,30)
    sampled_archive_days: int(1,60)
  ai:
    enabled: bool
    provider: list(local|openai|anthropic|cerebras)
    chat_backend: list(ha|direct|auto)
    model: str?
    base_url: str?
    api_key: password?
  scheduler:
    ingestion_interval_seconds: int(5,60)
    topology_recompute_seconds: int(10,120)
    metadata_refresh_seconds: int(60,3600)
  assessment:
    enabled: bool
    probation_interval_minutes: int(1,120)
    probation_checks: int(1,10)
    relaxing_initial_hours: int(1,24)
    relaxing_max_hours: int(1,72)
    heightened_initial_minutes: int(5,240)
    heightened_max_hours: int(1,24)
    engaged_interval_minutes: int(1,60)
    engaged_decay_minutes: int(10,720)
    daily_budget_calls: int(1,288)
    context_recent_findings_default: int(1,100)
